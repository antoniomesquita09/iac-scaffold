name: Infra — Backend

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/backend/**'
      - '.github/workflows/infra-backend.yml'
  push:
    branches: [main]
    paths:
      - 'infra/backend/**'
      - '.github/workflows/infra-backend.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write   # allows posting plan output as PR comment

env:
  TF_WORKING_DIR: infra/backend
  # Non-sensitive Terraform variables — set these under repo Settings → Variables
  TF_VAR_aws_region: ${{ vars.TF_VAR_AWS_REGION }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
  TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
  TF_VAR_api_subdomain: ${{ vars.TF_VAR_API_SUBDOMAIN }}
  TF_VAR_app_port: ${{ vars.TF_VAR_APP_PORT }}
  TF_VAR_app_count: ${{ vars.TF_VAR_APP_COUNT }}
  TF_VAR_fargate_cpu: ${{ vars.TF_VAR_FARGATE_CPU }}
  TF_VAR_fargate_memory: ${{ vars.TF_VAR_FARGATE_MEMORY }}
  TF_VAR_db_name: ${{ vars.TF_VAR_DB_NAME }}
  TF_VAR_db_username: ${{ vars.TF_VAR_DB_USERNAME }}
  TF_VAR_db_instance_class: ${{ vars.TF_VAR_DB_INSTANCE_CLASS }}
  # No TF_VAR_db_password: RDS manages the master password in Secrets Manager.

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 65000
              ? plan.slice(0, 65000) + '\n\n_(output truncated — see workflow logs for full plan)_'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — Backend\n\`\`\`\n${truncated}\n\`\`\``
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
